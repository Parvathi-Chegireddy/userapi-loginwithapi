spring:
  application:
    name: userservice

  datasource:
    url: jdbc:mysql://localhost:3306/regularAuthentication?createDatabaseIfNotExist=true
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      # 'update' — Hibernate adds missing columns (avatar_url, provider, etc.)
      # Safe to keep as 'update' permanently in development.
      # In production, use Flyway/Liquibase migrations instead.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 9091